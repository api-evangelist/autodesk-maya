aid: autodesk-maya
name: Autodesk Maya
description: >-
  Autodesk Maya is a comprehensive 3D computer graphics application used for
  creating interactive 3D applications including video games, animated films,
  TV series, and visual effects. Maya provides multiple programming APIs
  including a Python API, C++ plugin API, MEL scripting language, USD
  integration, and Bifrost visual programming environment for extending and
  automating Maya workflows and creating custom tools and plugins.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - 3D Graphics
  - Animation
  - Game Development
  - Modeling
  - Rendering
  - Visual Effects
  - VFX
  - CAD
url: >-
  https://raw.githubusercontent.com/api-evangelist/autodesk-maya/refs/heads/main/apis.yml
created: '2025-01-01'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: autodesk-maya:maya-python-api
    name: Maya Python API
    description: >-
      Python API for scripting and extending Maya functionality, providing access
      to Maya's scene graph and node architecture. Includes Python API 2.0 with a
      more Pythonic workflow and improved performance via maya.api.OpenMaya, as
      well as Python API 1.0 via maya.OpenMaya and the maya.cmds wrapper for MEL
      commands.
    humanURL: https://help.autodesk.com/view/MAYAUL/2026/ENU/
    baseURL: https://localhost
    tags:
      - Automation
      - Python
      - Scripting
    properties:
      - type: Documentation
        url: https://help.autodesk.com/view/MAYAUL/2024/ENU/?guid=Maya_SDK_MERGED_Maya_Python_API_Maya_Python_API_2_0_html
      - type: APIReference
        url: https://help.autodesk.com/view/MAYAUL/2024/ENU/?guid=Maya_SDK_py_ref_index_html
      - type: GettingStarted
        url: https://help.autodesk.com/view/MAYAUL/2024/ENU/?guid=Maya_SDK_MERGED_Maya_Python_API_Python_API_2_0_Quick_Start_html

  - aid: autodesk-maya:maya-cpp-api
    name: Maya C++ API
    description: >-
      C++ API providing low-level access to Maya's core functionality for
      creating plugins, custom nodes, and high-performance tools. The API is
      organized into functional libraries including OpenMaya, OpenMayaUI,
      OpenMayaAnim, OpenMayaFX, and OpenMayaRender.
    humanURL: https://help.autodesk.com/view/MAYAUL/2026/ENU/
    baseURL: https://localhost
    tags:
      - C++
      - Native
      - Performance
      - Plugins
    properties:
      - type: Documentation
        url: https://help.autodesk.com/view/MAYAUL/2024/ENU/?guid=Maya_SDK_MERGED_cpp_ref_index_html
      - type: APIReference
        url: https://help.autodesk.com/view/MAYAUL/2024/ENU/?guid=Maya_SDK_cpp_ref_index_html
      - type: GettingStarted
        url: https://help.autodesk.com/view/MAYAUL/2024/ENU/?guid=Maya_SDK_MERGED_Maya_SDK_Maya_SDK_html

  - aid: autodesk-maya:maya-mel-commands
    name: Maya Commands (MEL)
    description: >-
      Maya Embedded Language (MEL) scripting interface for automating tasks and
      customizing Maya workflows. MEL provides direct access to Maya commands
      and is the foundation of Maya's scripting capabilities.
    humanURL: https://help.autodesk.com/view/MAYAUL/2026/ENU/
    baseURL: https://localhost
    tags:
      - Automation
      - Commands
      - MEL
      - Scripting
    properties:
      - type: Documentation
        url: https://help.autodesk.com/view/MAYAUL/2024/ENU/?guid=__CommandsPython_index_html
      - type: APIReference
        url: https://help.autodesk.com/view/MAYAUL/2024/ENU/?guid=__Commands_index_html

  - aid: autodesk-maya:maya-usd-api
    name: Maya USD API
    description: >-
      Universal Scene Description (USD) integration for Maya, enabling exchange
      of 3D content between applications. Provides tools for importing, exporting,
      and working with USD stages and layers within Maya.
    humanURL: https://help.autodesk.com/view/MAYAUL/2026/ENU/
    baseURL: https://localhost
    tags:
      - Interchange
      - Pipeline
      - Scene Description
      - USD
    properties:
      - type: Documentation
        url: https://help.autodesk.com/view/MAYAUL/2024/ENU/?guid=GUID-C7DB6AF9-653E-4B49-93D6-F9C2D0865B85
      - type: GitHubRepository
        url: https://github.com/Autodesk/maya-usd

  - aid: autodesk-maya:maya-bifrost-api
    name: Maya Bifrost API
    description: >-
      Bifrost is Maya's visual programming environment for creating simulation
      and procedural effects. It provides a node-based graph editor for building
      complex effects including fluids, particles, destruction, and procedural
      geometry, with SDK support for custom node development.
    humanURL: https://help.autodesk.com/view/MAYAUL/2026/ENU/?guid=GUID-1223AA4F-1CD7-473C-87EA-C16C6B28F7FD
    baseURL: https://localhost
    tags:
      - Bifrost
      - Particles
      - Procedural Effects
      - Simulation
      - Visual Programming
    properties:
      - type: Documentation
        url: https://help.autodesk.com/view/MAYAUL/2026/ENU/?guid=Bifrost_MayaPlugin_bifrost_for_maya_html
      - type: GitHubRepository
        url: https://github.com/Autodesk/bifrost-usd

