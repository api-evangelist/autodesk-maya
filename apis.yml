  - type: Features
    data:
      - name: Python API 2.0
        description: >-
          Modern Pythonic API with improved performance and a cleaner interface for
          accessing Maya's node architecture and scene graph via maya.api.OpenMaya.
      - name: C++ Plugin SDK
        description: >-
          Low-level C++ API for high-performance plugin development with access to
          Maya's full internal architecture through OpenMaya functional libraries.
      - name: MEL Scripting
        description: >-
          Maya Embedded Language for command-line scripting, UI automation, and
          batch processing of Maya scenes and assets.
      - name: USD Integration
        description: >-
          Universal Scene Description support for importing, exporting, and working
          with USD assets within Maya for cross-application 3D content pipelines.
      - name: Bifrost Visual Programming
        description: >-
          Node-based visual programming environment for creating procedural effects,
          simulations, and custom workflows without traditional coding.
      - name: Custom Node Development
        description: >-
          Create custom dependency graph nodes, deformers, and shape nodes that
          integrate natively into Maya's scene graph and evaluation system.
  - type: UseCases
    data:
      - name: VFX Pipeline Integration
        description: >-
          Integrating Maya into visual effects production pipelines with custom
          tools, asset management systems, and render farm automation.
      - name: Game Asset Automation
        description: >-
          Automating game asset creation, optimization, and export workflows for
          game engines like Unreal Engine and Unity through Maya scripting.
      - name: Animation Workflow Tools
        description: >-
          Building custom rigging systems, animation controls, and workflow tools
          to accelerate character animation production for film and TV.
      - name: Procedural Content Generation
        description: >-
          Using Bifrost and Python APIs to generate procedural geometry, textures,
          and scene content for games, visualization, and architectural projects.
      - name: DCC Pipeline Development
        description: >-
          Developing studio pipeline tools that automate scene assembly, asset
          tracking, and data interchange between Maya and other DCC applications.
  - type: Integrations
    data:
      - name: Autodesk Arnold
        description: >-
          Integration with Arnold renderer via the MtoA (Maya to Arnold) plugin
          for photorealistic rendering of Maya scenes.
      - name: Unreal Engine
        description: >-
          USD-based pipeline integration with Unreal Engine for game asset export
          and visualization workflows.
      - name: ShotGrid (Flow Production Tracking)
        description: >-
          Integration with Autodesk ShotGrid for production tracking, asset
          management, and review workflows in film and TV production.
      - name: Houdini
        description: >-
          Interoperability with SideFX Houdini via USD and Alembic for visual
          effects simulation and procedural content pipelines.
